---
name: Release
on:
  push:
    tags: [v*]
permissions: {}
jobs:
  release:
    uses: suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml@884a4badb955df4a4ddddd802e433096371f3157 # v8.1.0
    with:
      go-version-file: go.mod
      aqua_policy_allow: true
      aqua_version: v2.59.1
    permissions:
      contents: write
      id-token: write
      actions: read
      attestations: write
